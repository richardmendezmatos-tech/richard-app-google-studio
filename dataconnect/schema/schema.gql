# Richard Automotive Command Center - Data Connect Schema

type User @table {
  id: String! @default(expr: "auth.uid")
  username: String! @col(dataType: "varchar(255)")
  role: String! @default(value: "user")
  createdAt: Date! @default(expr: "request.time")
}

# Cars are publicly viewable
type Car @table {
  id: UUID! @default(expr: "uuidV4()")
  year: Int!
  make: String!
  model: String!
  name: String!
  price: Float!
  mileage: Int!
  type: String!
  category: String!
  condition: String!
  features: [String]
  description: String
  status: String @default(value: "available")
  updatedAt: Date! @default(expr: "request.time")
  daysInInventory: Int @default(value: 0)
}

# Leads are sensitive
type Lead @table {
  id: UUID! @default(expr: "uuidV4()")
  firstName: String!
  lastName: String!
  phone: String!
  email: String!
  monthlyIncome: String
  timeAtJob: String
  jobTitle: String
  employer: String
  vehicleId: UUID
  hasPronto: Boolean @default(value: false)
  chatInteractions: Int @default(value: 0)
  viewedInventoryMultipleTimes: Boolean @default(value: false)
  location: String
  category: String # HOT, WARM, COLD
  status: String @default(value: "NEW")
  responded: Boolean @default(value: false)
  documentsSent: Boolean @default(value: false)
  dealClosed: Boolean @default(value: false)
  appointmentCompleted: Boolean @default(value: false)
  timestamp: Date! @default(expr: "request.time")
  vehicleOfInterest: String
}
