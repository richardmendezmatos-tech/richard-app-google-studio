# Richard Automotive Mutations

# Staff only: Create a new car in inventory
mutation CreateCar(
  $year: Int!
  $make: String!
  $model: String!
  $name: String!
  $price: Float!
  $mileage: Int!
  $type: String!
  $category: String!
  $condition: String!
  $img: String
  $dealerId: String
  $featured: Boolean
  $views: Int
  $leadsCount: Int
) @auth(level: PUBLIC, insecureReason: "Automated server-side ingestion.") {
  car_insert(
    data: {
      year: $year
      make: $make
      model: $model
      name: $name
      price: $price
      mileage: $mileage
      type: $type
      category: $category
      condition: $condition
      img: $img
      dealerId: $dealerId
      featured: $featured
      views: $views
      leadsCount: $leadsCount
    }
  )
}

# Public: New lead registration
mutation CreateLead(
  $firstName: String!
  $lastName: String!
  $phone: String!
  $email: String!
  $vehicleOfInterest: String
  $vehicleId: UUID
  $type: String
  $behavioralData: String
  $aiAnalysis: String
  $marketingData: String
  $closureProbability: Float
  $totalVisits: Int
) @auth(level: PUBLIC, insecureReason: "Anyone can register as a lead.") {
  lead_insert(
    data: {
      firstName: $firstName
      lastName: $lastName
      phone: $phone
      email: $email
      vehicleOfInterest: $vehicleOfInterest
      vehicleId: $vehicleId
      type: $type
      behavioralData: $behavioralData
      aiAnalysis: $aiAnalysis
      marketingData: $marketingData
      closureProbability: $closureProbability
      totalVisits: $totalVisits
    }
  )
}

# Staff only: Update lead status
mutation UpdateLeadStatus($id: UUID!, $status: String!)
@auth(level: USER, insecureReason: "Staff can update lead status.") {
  lead_update(id: $id, data: { status: $status })
}

# AI Engine: Update predictive insights and behavior
mutation UpdateLeadIntelligence(
  $id: UUID!
  $aiAnalysis: String
  $closureProbability: Float
  $behavioralData: String
  $marketingData: String
) @auth(level: USER, insecureReason: "Server-side and staff updates only.") {
  lead_update(
    id: $id,
    data: {
      aiAnalysis: $aiAnalysis
      closureProbability: $closureProbability
      behavioralData: $behavioralData
      marketingData: $marketingData
    }
  )
}
