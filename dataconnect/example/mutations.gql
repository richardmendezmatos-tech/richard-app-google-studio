# Richard Automotive Mutations

# Staff only: Create a new car in inventory
mutation CreateCar(
  $year: Int!
  $make: String!
  $model: String!
  $name: String!
  $price: Float!
  $mileage: Int!
  $type: String!
  $category: String!
  $condition: String!
) @auth(level: USER, insecureReason: "Staff can create new cars.") {
  car_insert(
    data: {
      year: $year
      make: $make
      model: $model
      name: $name
      price: $price
      mileage: $mileage
      type: $type
      category: $category
      condition: $condition
    }
  )
}

# Public: New lead registration
mutation CreateLead(
  $firstName: String!
  $lastName: String!
  $phone: String!
  $email: String!
  $vehicleOfInterest: String
) @auth(level: PUBLIC, insecureReason: "Anyone can register as a lead.") {
  lead_insert(
    data: {
      firstName: $firstName
      lastName: $lastName
      phone: $phone
      email: $email
      vehicleOfInterest: $vehicleOfInterest
    }
  )
}

# Staff only: Update lead status
mutation UpdateLeadStatus($id: UUID!, $status: String!)
@auth(level: USER, insecureReason: "Staff can update lead status.") {
  lead_update(id: $id, data: { status: $status })
}
