# Richard Automotive Car Queries

# Public access to inventory
query ListCars @auth(level: PUBLIC, insecureReason: "Anyone can list cars in inventory.") {
  cars {
    id
    make
    model
    year
    price
    status
    category
  }
}

# Public access to individual car details
query GetCar($id: UUID!) @auth(level: PUBLIC, insecureReason: "Anyone can view car details.") {
  car(id: $id) {
    id
    make
    model
    year
    price
    mileage
    condition
    description
    features
    status
  }
}

# Lead search (USER restriction for staff)
query GetLead($id: UUID!) @auth(level: USER, insecureReason: "Staff can view any lead by ID.") {
  lead(id: $id) {
    id
    firstName
    lastName
    phone
    email
    status
    category
    timestamp
  }
}
