name: Sync Inventory (Central Ford)

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      manual:
        description: 'Manual sync with WhatsApp broadcast'
        required: false
        default: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Inventory Sync Cron
        run: |
          curl -X GET "https://richard-automotive.com/api/cron/sync-inventory?manual=${{ github.event.inputs.manual || 'true' }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
