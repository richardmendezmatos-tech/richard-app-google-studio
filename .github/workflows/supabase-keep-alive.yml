name: Supabase Keep-Alive

on:
  schedule:
    # Se ejecuta a las 00:00 los lunes y jueves (UTC)
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          # Nota: Usamos la tabla 'search_gaps' que está confirmada en el código
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/search_gaps?select=*&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
