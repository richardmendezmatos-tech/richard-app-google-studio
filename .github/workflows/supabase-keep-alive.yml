name: Supabase Smart Keep-Alive

on:
  schedule:
    # Se ejecuta a las 00:00 UTC los lunes, miércoles y viernes (Días de picos publicitarios)
    - cron: "0 0 * * 1,3,5"
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  health_check_and_ping:
    runs-on: ubuntu-latest
    steps:
      - name: Verify and Ping Supabase
        run: |
          echo "Iniciando Health Check para Supabase..."

          # 1. Intentar un ping rápido
          RESPONSE=$(curl -o /dev/null -s -w "%{http_code}" -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/search_gaps?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          if [ "$RESPONSE" -eq "200" ]; then
            echo "✅ El servicio está activo. Ping registrado con éxito."
          elif [ "$RESPONSE" -eq "401" ]; then
            echo "❌ Error de Autorización (401). Revisa tus secretos SUPABASE_ANON_KEY."
            exit 1
          elif [ "$RESPONSE" -eq "404" ]; then
            echo "❌ Tabla no encontrada (404). Revisa si 'search_gaps' existe."
            exit 1
          else
            echo "⚠️ El servicio devolvió código $RESPONSE. Forzando ping de despertar..."
            curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/search_gaps?select=*&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          fi
