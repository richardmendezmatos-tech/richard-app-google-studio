name: Cron - Market Scraper + Log Cleanup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Market Scraper Cron
        run: |
          curl -s -X GET "https://richard-automotive.com/api/cron/market-scraper" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
