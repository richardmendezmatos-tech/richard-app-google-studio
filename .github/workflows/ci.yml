name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "24"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env for test runner
        run: |
          cat > .env << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          NEXT_PUBLIC_GOOGLE_CLIENT_ID=placeholder-client-id
          VITE_GEMINI_API_KEY=placeholder-gemini
          VITE_SUPABASE_URL=https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY=placeholder-anon-key
          VITE_FIREBASE_API_KEY=placeholder-firebase
          VITE_FIREBASE_AUTH_DOMAIN=placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=placeholder
          VITE_FIREBASE_STORAGE_BUCKET=placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID=1234567890
          VITE_FIREBASE_APP_ID=1:1234567890:web:placeholder
          VITE_FIREBASE_MEASUREMENT_ID=G-PLACEHOLDER
          VITE_RESEND_API_KEY=re_placeholder
          EOF

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Post PR comment on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "## ❌ CI Failed",
              "Lint or unit tests failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.",
              "",
              "Run `npm run lint` and `npm run test` locally to reproduce."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  e2e-tests:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env for test runner
        run: |
          cat > .env << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY=placeholder-service-role-key
          NEXT_PUBLIC_GOOGLE_CLIENT_ID=placeholder-client-id
          VITE_GEMINI_API_KEY=placeholder-gemini
          VITE_SUPABASE_URL=https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY=placeholder-anon-key
          VITE_FIREBASE_API_KEY=placeholder-firebase
          VITE_FIREBASE_AUTH_DOMAIN=placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=placeholder
          VITE_FIREBASE_STORAGE_BUCKET=placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID=1234567890
          VITE_FIREBASE_APP_ID=1:1234567890:web:placeholder
          VITE_FIREBASE_MEASUREMENT_ID=G-PLACEHOLDER
          VITE_RESEND_API_KEY=re_placeholder
          EOF

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Post PR comment on e2e failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "## ❌ E2E Tests Failed",
              "Playwright e2e tests failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.",
              "",
              "Download the **playwright-report** artifact to view the HTML report.",
              "Run `npm run test:e2e` locally to reproduce."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
